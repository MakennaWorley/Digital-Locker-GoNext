run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

output:
  formats:
    - format: colored-line-number

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
